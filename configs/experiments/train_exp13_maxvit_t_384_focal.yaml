project_name: ml_weather
seed: 42

data:
  batch_size: 8
  image_size: 384

model:
  name: maxvit_t
  pretrained: true
  dropout: 0.35

training:
  epochs: 10
  learning_rate: 0.00015
  optimizer: adamw
  weight_decay: 0.0001
  use_scheduler: true
  loss: focal
  focal_gamma: 2.0
  label_smoothing: 0.05
  grad_clip_norm: 1.0
  class_weights:
    normalize: true
    multipliers:
      night_snow: 2.3
      for_rain: 1.8
      night_fog: 1.5
  sampling:
    weighted_sampler: true

augmentation:
  resize_size: 420
  random_resized_crop:
    scale: [0.8, 1.0]
  horizontal_flip: true
  rotation_degrees: 8
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.15
    hue: 0.03
  gaussian_blur:
    kernel_size: 5
    sigma: [0.3, 1.6]

mlflow:
  enabled: true
  experiment_name: weather_classification
  run_name: exp13_maxvit_t_384_focal
  tags:
    project: ml_weather
    series: advanced_models
    focus: detail_and_imbalance
