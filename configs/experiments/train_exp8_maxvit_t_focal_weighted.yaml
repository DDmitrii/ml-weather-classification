project_name: ml_weather
seed: 42

data:
  batch_size: 16
  image_size: 224

model:
  name: maxvit_t
  pretrained: true
  dropout: 0.3

training:
  epochs: 6
  learning_rate: 0.0002
  optimizer: adamw
  weight_decay: 0.0001
  use_scheduler: true
  loss: focal
  focal_gamma: 2.0
  label_smoothing: 0.05
  grad_clip_norm: 1.0
  class_weights:
    normalize: true
    multipliers:
      night_snow: 2.5
      for_rain: 1.8
      night_fog: 1.5
  sampling:
    weighted_sampler: true

augmentation:
  resize_size: 256
  random_resized_crop:
    scale: [0.7, 1.0]
  horizontal_flip: true
  rotation_degrees: 12
  color_jitter:
    brightness: 0.25
    contrast: 0.25
    saturation: 0.2
    hue: 0.04
  gaussian_blur:
    kernel_size: 5
    sigma: [0.3, 1.8]
  rand_augment:
    num_ops: 2
    magnitude: 7

mlflow:
  enabled: true
  experiment_name: weather_classification
  run_name: exp8_maxvit_t_focal_weighted
  tags:
    project: ml_weather
    series: advanced_models
    focus: rare_classes
