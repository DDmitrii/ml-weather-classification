# @package _global_

model:
  name: convnext_tiny
  pretrained: true
  freeze_epochs: 5

training:
  max_epochs: 30
  multihead: true
  loss: focal_multihead
  focal_gamma: 2.0
  multihead_lambda: 1.0

mlflow:
  experiment_name: "focal-multihead-convnext-tiny"
  run_name: "focal-multihead-gamma2-v1"