project_name: ml_weather
seed: 42

data:
  batch_size: 32

training:
  epochs: 15
  learning_rate: 0.0001
  optimizer: adam
  use_scheduler: true

augmentation:
  horizontal_flip: true
  rotation_degrees: 20
  color_jitter:
    brightness: 0.25
    contrast: 0.25
    saturation: 0.25
    hue: 0.05

mlflow:
  enabled: true
  experiment_name: weather_classification
  run_name: exp6_strong_aug
  tags:
    project: ml_weather
    series: augmentation_sweep
    augmentation: strong_aug
