project_name: ml_weather
seed: 42

data:
  batch_size: 32
  image_size: 224

model:
  name: convnext_tiny
  pretrained: true
  dropout: 0.3

training:
  epochs: 10
  learning_rate: 0.0005
  optimizer: adamw
  weight_decay: 0.0001
  use_scheduler: true
  label_smoothing: 0.05
  grad_clip_norm: 1.0
  fine_tune:
    freeze_backbone: true
    unfreeze_patterns:
      - classifier

augmentation:
  resize_size: 256
  random_resized_crop:
    scale: [0.8, 1.0]
  horizontal_flip: true
  rotation_degrees: 8
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.1
    hue: 0.02

mlflow:
  enabled: true
  experiment_name: weather_classification
  run_name: exp12_convnext_tiny_head_only
  tags:
    project: ml_weather
    series: finetune
    focus: head_only
