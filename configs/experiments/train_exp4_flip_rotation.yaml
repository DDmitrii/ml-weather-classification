project_name: ml_weather
seed: 42

data:
  batch_size: 32

training:
  epochs: 12
  learning_rate: 0.0001
  optimizer: adam
  use_scheduler: false

augmentation:
  horizontal_flip: true
  rotation_degrees: 15
  color_jitter: {}

mlflow:
  enabled: true
  experiment_name: weather_classification
  run_name: exp4_flip_rotation
  tags:
    project: ml_weather
    series: augmentation_sweep
    augmentation: flip_rotation
