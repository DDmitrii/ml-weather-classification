project_name: ml_weather
seed: 42

data:
  batch_size: 32

training:
  epochs: 12
  learning_rate: 0.0001
  optimizer: adam
  use_scheduler: false

augmentation:
  horizontal_flip: true
  rotation_degrees: 0
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.15
    hue: 0.03

mlflow:
  enabled: true
  experiment_name: weather_classification
  run_name: exp5_flip_color
  tags:
    project: ml_weather
    series: augmentation_sweep
    augmentation: flip_color
